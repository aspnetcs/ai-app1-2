server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: platform-api
  config:
    import: optional:file:../../deploy/.env[.properties],optional:file:deploy/.env[.properties]
  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:512MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:512MB}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/webchat}
    username: ${SPRING_DATASOURCE_USERNAME:webchat}
    password: ${SPRING_DATASOURCE_PASSWORD:webchat_dev_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    enabled: ${PLATFORM_FLYWAY_ENABLED:false}
    validate-on-migrate: ${PLATFORM_FLYWAY_VALIDATE_ON_MIGRATE:true}
    # Empty default keeps the normal path strict; set the env var only for a temporary shared-db diagnostic window.
    ignore-migration-patterns: ${PLATFORM_FLYWAY_IGNORE_MIGRATION_PATTERNS:}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      repositories:
        enabled: false

jwt:
  secret: ${JWT_SECRET:local-dev-jwt-secret-change-before-production-20260323}

platform:
  dev-panel: ${DEV_PANEL:false}
  files:
    enabled: ${PLATFORM_FILES_ENABLED:true}
    max-size-bytes: ${PLATFORM_FILES_MAX_SIZE_BYTES:26214400}
  multimodal-upload:
    enabled: ${PLATFORM_MULTIMODAL_UPLOAD_ENABLED:true}
    max-images-per-message: ${PLATFORM_MULTIMODAL_MAX_IMAGES:4}
    max-document-chars: ${PLATFORM_MULTIMODAL_MAX_DOC_CHARS:50000}
    allowed-mime-types: ${PLATFORM_MULTIMODAL_ALLOWED_MIMES:image/png,image/jpeg,image/webp,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/msword,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/plain}
  channel-fallback-enabled: ${CHANNEL_FALLBACK_ENABLED:true}
  model-metadata:
    enabled: ${PLATFORM_MODEL_METADATA_ENABLED:true}
  audio:
    enabled: ${PLATFORM_AUDIO_ENABLED:false}
    tts:
      enabled: ${TTS_ENABLED:false}
      default-model: ${TTS_DEFAULT_MODEL:tts-1}
      default-voice: ${TTS_DEFAULT_VOICE:alloy}
      response-format: ${TTS_RESPONSE_FORMAT:mp3}
      max-input-chars: ${TTS_MAX_INPUT_CHARS:2000}
      browser-fallback-enabled: ${TTS_BROWSER_FALLBACK_ENABLED:true}
    stt:
      enabled: ${STT_ENABLED:false}
  research-assistant:
    enabled: ${RESEARCH_ASSISTANT_ENABLED:false}
    max-concurrent-pipelines: ${RESEARCH_MAX_PIPELINES:3}
    stage-timeout-minutes: ${RESEARCH_STAGE_TIMEOUT:30}
    llm:
      model: ${RESEARCH_LLM_MODEL:}
      max-tokens: ${RESEARCH_LLM_MAX_TOKENS:4096}
      temperature: ${RESEARCH_LLM_TEMPERATURE:0.7}
    literature:
      enabled: ${RESEARCH_LITERATURE_ENABLED:true}
      sources: ${RESEARCH_LIT_SOURCES:openalex,semantic_scholar,arxiv}
      s2-api-key: ${SEMANTIC_SCHOLAR_API_KEY:}
      max-results-per-source: ${RESEARCH_LIT_MAX_RESULTS:20}
      cache-ttl-hours: ${RESEARCH_LIT_CACHE_TTL:24}
    experiment:
      enabled: ${RESEARCH_EXPERIMENT_ENABLED:false}
      mode: ${RESEARCH_EXPERIMENT_MODE:simulated}
      time-budget-sec: ${RESEARCH_EXPERIMENT_TIME_BUDGET:300}
    paper:
      enabled: ${RESEARCH_PAPER_ENABLED:false}
      max-iterations: ${RESEARCH_PAPER_MAX_ITERATIONS:3}
      quality-threshold: ${RESEARCH_PAPER_QUALITY_THRESHOLD:7.0}
  temporary-chat:
    enabled: ${TEMPORARY_CHAT_ENABLED:false}
  conversation-pin-star:
    enabled: ${CONVERSATION_PIN_STAR_ENABLED:false}
  message-versioning:
    enabled: ${MESSAGE_VERSIONING_ENABLED:false}
  summary:
    enabled: ${SUMMARY_ENABLED:false}
    default-model: ${SUMMARY_DEFAULT_MODEL:}
    default-style: ${SUMMARY_DEFAULT_STYLE:bullet}
    max-input-chars: ${SUMMARY_MAX_INPUT_CHARS:20000}
    max-file-bytes: ${SUMMARY_MAX_FILE_BYTES:51200}
  translation:
    enabled: ${TRANSLATION_ENABLED:false}
    default-model: ${TRANSLATION_DEFAULT_MODEL:}
    default-target-language: ${TRANSLATION_DEFAULT_TARGET_LANGUAGE:English}
    max-input-chars: ${TRANSLATION_MAX_INPUT_CHARS:8000}
  prompt-library: ${PROMPT_LIBRARY_ENABLED:true}
  prompt-optimize:
    enabled: ${PROMPT_OPTIMIZE_ENABLED:false}
    default-model: ${PROMPT_OPTIMIZE_DEFAULT_MODEL:}
    default-direction: ${PROMPT_OPTIMIZE_DEFAULT_DIRECTION:detailed}
    max-input-chars: ${PROMPT_OPTIMIZE_MAX_INPUT_CHARS:8000}
  follow-up:
    enabled: ${FOLLOW_UP_ENABLED:false}
    default-model: ${FOLLOW_UP_DEFAULT_MODEL:}
    max-suggestions: ${FOLLOW_UP_MAX_SUGGESTIONS:3}
    max-context-chars: ${FOLLOW_UP_MAX_CONTEXT_CHARS:4000}
  web-read:
    enabled: ${WEB_READ_ENABLED:false}
    max-content-chars: ${WEB_READ_MAX_CONTENT_CHARS:8000}
    connect-timeout-ms: ${WEB_READ_CONNECT_TIMEOUT_MS:8000}
    allow-http: ${WEB_READ_ALLOW_HTTP:false}
    enforce-host-allowlist: ${WEB_READ_ENFORCE_HOST_ALLOWLIST:true}
    allowed-hosts: ${WEB_READ_ALLOWED_HOSTS:}
  mermaid:
    enabled: ${MERMAID_ENABLED:false}
  mindmap:
    enabled: ${MINDMAP_ENABLED:false}
    default-model: ${MINDMAP_DEFAULT_MODEL:}
    max-input-chars: ${MINDMAP_MAX_INPUT_CHARS:12000}
  export-image:
    enabled: ${EXPORT_IMAGE_ENABLED:false}
    watermark-text: ${EXPORT_IMAGE_WATERMARK_TEXT:Generated by AI Assistant}
    qr-text: ${EXPORT_IMAGE_QR_TEXT:Open the app for full conversation}
    themes: ${EXPORT_IMAGE_THEMES:light,minimal,poster}
  banner:
    enabled: ${BANNER_ENABLED:false}
  user-groups:
    enabled: ${USER_GROUPS_ENABLED:false}
  templates:
    enabled: ${TEMPLATES_ENABLED:false}
  presets:
    enabled: ${PRESETS_ENABLED:true}
  masks:
    enabled: ${MASKS_ENABLED:true}
  feedback:
    enabled: ${FEEDBACK_ENABLED:false}
  pwa:
    enabled: ${PWA_ENABLED:false}
    force-refresh: ${PWA_FORCE_REFRESH:false}
  config-transfer:
    enabled: ${CONFIG_TRANSFER_ENABLED:false}
  function-calling:
    enabled: ${FUNCTION_CALLING_ENABLED:false}
    max-steps: ${FUNCTION_CALLING_MAX_STEPS:4}
    tools:
      current-time:
        enabled: ${FUNCTION_TOOL_CURRENT_TIME_ENABLED:true}
      calculator:
        enabled: ${FUNCTION_TOOL_CALCULATOR_ENABLED:true}
      web-page-summary:
        enabled: ${FUNCTION_TOOL_WEB_PAGE_SUMMARY_ENABLED:true}
  multi-chat:
    enabled: ${MULTI_CHAT_ENABLED:false}
    max-models: ${MULTI_CHAT_MAX_MODELS:3}
  multi-agent-discussion:
    enabled: ${MULTI_AGENT_DISCUSSION_ENABLED:false}
    max-agents: ${MULTI_AGENT_DISCUSSION_MAX_AGENTS:4}
    max-rounds: ${MULTI_AGENT_DISCUSSION_MAX_ROUNDS:20}
  team-chat:
    enabled: ${TEAM_CHAT_ENABLED:true}
    max-models: ${TEAM_CHAT_MAX_MODELS:5}
  voice-chat:
    enabled: ${VOICE_CHAT_ENABLED:false}
    max-duration-seconds: ${VOICE_CHAT_MAX_DURATION:60}
    stt-model: ${VOICE_CHAT_STT_MODEL:whisper-1}
    tts-model: ${VOICE_CHAT_TTS_MODEL:tts-1}
    tts-voice: ${VOICE_CHAT_TTS_VOICE:alloy}
  mcp:
    enabled: ${MCP_ENABLED:false}
    max-servers: ${MCP_MAX_SERVERS:10}
    request-timeout-ms: ${MCP_REQUEST_TIMEOUT_MS:30000}
  agent-market:
    enabled: ${AGENT_MARKET_ENABLED:false}
    allow-remote-source: ${AGENT_MARKET_ALLOW_REMOTE:false}
  auth:
    guest:
      enabled: ${PLATFORM_AUTH_GUEST_ENABLED:true}
  role-policy:
    policies:
      guest:
        allowed-models: ${ROLE_GUEST_ALLOWED_MODELS:}
        rate-limit-per-minute: ${ROLE_GUEST_RPM:10}
        model-rate-limit-per-minute: ${ROLE_GUEST_MODEL_RPM:5}
        daily-chat-quota: ${ROLE_GUEST_DAILY_QUOTA:20}
      user:
        allowed-models: ${ROLE_USER_ALLOWED_MODELS:}
        rate-limit-per-minute: ${ROLE_USER_RPM:30}
        model-rate-limit-per-minute: ${ROLE_USER_MODEL_RPM:0}
        daily-chat-quota: ${ROLE_USER_DAILY_QUOTA:100}
      premium:
        allowed-models: ${ROLE_PREMIUM_ALLOWED_MODELS:}
        rate-limit-per-minute: ${ROLE_PREMIUM_RPM:120}
        model-rate-limit-per-minute: ${ROLE_PREMIUM_MODEL_RPM:0}
        daily-chat-quota: ${ROLE_PREMIUM_DAILY_QUOTA:0}
      admin:
        allowed-models: ${ROLE_ADMIN_ALLOWED_MODELS:}
        rate-limit-per-minute: ${ROLE_ADMIN_RPM:999}
        model-rate-limit-per-minute: ${ROLE_ADMIN_MODEL_RPM:0}
        daily-chat-quota: ${ROLE_ADMIN_DAILY_QUOTA:0}
      pending:
        allowed-models: ${ROLE_PENDING_ALLOWED_MODELS:}
        rate-limit-per-minute: ${ROLE_PENDING_RPM:0}
        model-rate-limit-per-minute: ${ROLE_PENDING_MODEL_RPM:0}
        daily-chat-quota: ${ROLE_PENDING_DAILY_QUOTA:0}
  oauth:
    enabled: ${OAUTH_ENABLED:false}
    auto-link-by-email: ${OAUTH_AUTO_LINK_BY_EMAIL:true}
    state-ttl-seconds: ${OAUTH_STATE_TTL_SECONDS:600}
    ticket-ttl-seconds: ${OAUTH_TICKET_TTL_SECONDS:120}
    start-rate-limit-per-minute: ${OAUTH_START_RATE_LIMIT_PER_MINUTE:20}
    consume-ticket-rate-limit-per-minute: ${OAUTH_CONSUME_TICKET_RATE_LIMIT_PER_MINUTE:40}
    allow-admin-login: ${OAUTH_ALLOW_ADMIN_LOGIN:true}
    callback-base-url: ${OAUTH_CALLBACK_BASE_URL:}
    allowed-redirect-hosts: ${OAUTH_ALLOWED_REDIRECT_HOSTS:localhost,127.0.0.1}
    providers:
      github:
        enabled: ${OAUTH_GITHUB_ENABLED:false}
        display-name: ${OAUTH_GITHUB_DISPLAY_NAME:GitHub}
        client-id: ${OAUTH_GITHUB_CLIENT_ID:}
        client-secret: ${OAUTH_GITHUB_CLIENT_SECRET:}
        authorize-uri: ${OAUTH_GITHUB_AUTHORIZE_URI:https://github.com/login/oauth/authorize}
        token-uri: ${OAUTH_GITHUB_TOKEN_URI:https://github.com/login/oauth/access_token}
        user-info-uri: ${OAUTH_GITHUB_USER_INFO_URI:https://api.github.com/user}
        email-uri: ${OAUTH_GITHUB_EMAIL_URI:https://api.github.com/user/emails}
        scope: ${OAUTH_GITHUB_SCOPE:read:user,user:email}
        icon: ${OAUTH_GITHUB_ICON:github}
        allow-user-login: ${OAUTH_GITHUB_ALLOW_USER_LOGIN:true}
        allow-admin-login: ${OAUTH_GITHUB_ALLOW_ADMIN_LOGIN:true}
      google:
        enabled: ${OAUTH_GOOGLE_ENABLED:false}
        display-name: ${OAUTH_GOOGLE_DISPLAY_NAME:Google}
        client-id: ${OAUTH_GOOGLE_CLIENT_ID:}
        client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET:}
        authorize-uri: ${OAUTH_GOOGLE_AUTHORIZE_URI:https://accounts.google.com/o/oauth2/v2/auth}
        token-uri: ${OAUTH_GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
        user-info-uri: ${OAUTH_GOOGLE_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
        email-uri: ${OAUTH_GOOGLE_EMAIL_URI:}
        scope: ${OAUTH_GOOGLE_SCOPE:openid,email,profile}
        icon: ${OAUTH_GOOGLE_ICON:google}
        allow-user-login: ${OAUTH_GOOGLE_ALLOW_USER_LOGIN:true}
        allow-admin-login: ${OAUTH_GOOGLE_ALLOW_ADMIN_LOGIN:true}

wechat:
  default-brand: ${WECHAT_DEFAULT_BRAND:brand-a}
  apps:
    brand-a:
      appid: ${WECHAT_BRAND_A_APPID:}
      secret: ${WECHAT_BRAND_A_SECRET:}
    brand-b:
      appid: ${WECHAT_BRAND_B_APPID:}
      secret: ${WECHAT_BRAND_B_SECRET:}

brand:
  # host -> brand 映射（可选）：当请求体未带 brand 时，允许由 Host/域名推导
  # host-map:
  #   brand-a.example.com: brand-a
  #   brand-b.example.com: brand-b
  host-map: {}

gotenberg:
  base-url: ${GOTENBERG_BASE_URL:http://localhost:3000}



ws-ticket:
  rate-limit-per-minute: ${WS_TICKET_RATE_LIMIT_PER_MINUTE:30}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
  access-key: ${MINIO_ACCESS_KEY:${MINIO_ROOT_USER:minioadmin}}
  secret-key: ${MINIO_SECRET_KEY:${MINIO_ROOT_PASSWORD:minioadmin123}}
  bucket: ${MINIO_BUCKET:webchat}

ai:
  default-model: ${AI_DEFAULT_MODEL:}
  master-key: ${AI_MASTER_KEY:local-dev-master-key-change-in-production}
  rate-limit-per-minute: ${AI_RATE_LIMIT_PER_MINUTE:60}
  model-rate-limit-per-minute: ${AI_MODEL_RATE_LIMIT_PER_MINUTE:0}
  ssrf:
    allowlist: ${AI_SSRF_ALLOWLIST:*}
    allow-private: ${AI_SSRF_ALLOW_PRIVATE:false}
    allow-http: ${AI_SSRF_ALLOW_HTTP:true}
    allow-http-localhost: ${AI_SSRF_ALLOW_HTTP_LOCALHOST:true}

